<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://oxygy.com/wp-content/uploads/2019/11/cropped-favicon-32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OXYGY × Working Futures — Day 1 · Barcelona</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Geist', 'system-ui', 'sans-serif'],
              mono: ['"Geist Mono"', 'ui-monospace', 'monospace'],
            },
            colors: {
              'stage-base': '#0E1320',
              'stage-white': '#EAEFF5',
              'stage-murmur': '#8B97A6',
              teal: {
                DEFAULT: '#38B2AC',
                dark: '#2C9A94',
              },
              accent: {
                yellow: '#F7E8A4',
                lavender: '#C3D0F5',
                peach: '#F5B8A0',
              },
            },
          },
        },
      };
    </script>
    <style>
      html, body, #root { height: 100%; }
      body { margin: 0; background: #0E1320; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
      @keyframes frame-enter {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .frame-enter > * {
        opacity: 0;
        animation: frame-enter 0.4s ease-out forwards;
      }
      .frame-enter > *:nth-child(1) { animation-delay: 0ms; }
      .frame-enter > *:nth-child(2) { animation-delay: 80ms; }
      .frame-enter > *:nth-child(3) { animation-delay: 160ms; }
      .frame-enter > *:nth-child(4) { animation-delay: 240ms; }
      .frame-enter > *:nth-child(5) { animation-delay: 320ms; }
      .frame-enter > *:nth-child(6) { animation-delay: 400ms; }

      /* Atmospheric breathing — for circles, halos, ambient visuals */
      @keyframes breathe-a {
        0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.85; }
        50% { transform: scale(1.04) translate(4px, -2px); opacity: 1; }
      }
      @keyframes breathe-b {
        0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.85; }
        50% { transform: scale(1.06) translate(-4px, 2px); opacity: 1; }
      }
      .breathe-a { animation: breathe-a 7s ease-in-out infinite; transform-origin: center; }
      .breathe-b { animation: breathe-b 9s ease-in-out infinite; transform-origin: center; }

      /* Underline sweep-in */
      @keyframes underline-sweep {
        from { transform: scaleX(0); }
        to { transform: scaleX(1); }
      }
      .underline-sweep {
        transform-origin: left center;
        animation: underline-sweep 0.7s ease-out 0.6s forwards;
        transform: scaleX(0);
      }

      /* Title letter cascade — used by Frame 1 */
      @keyframes title-letter {
        from { opacity: 0; transform: translateY(20px); filter: blur(8px); }
        to { opacity: 1; transform: translateY(0); filter: blur(0); }
      }
      .title-letter {
        display: inline-block;
        opacity: 0;
        animation: title-letter 0.7s ease-out forwards;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@^19.2.4",
          "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
          "react/": "https://esm.sh/react@^19.2.4/",
          "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/barcelona/main.tsx"></script>
  </body>
</html>
